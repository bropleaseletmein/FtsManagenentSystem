<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitnessNetwork</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --sidebar-active: #4f46e5;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --info: #0284c7;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .login-card {
      background: var(--surface); border-radius: 16px;
      padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo-icon {
      width: 56px; height: 56px; background: var(--accent); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
    }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .login-logo p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500;
                        color: var(--text-muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; outline: none; transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn { display: inline-flex; align-items: center; justify-content: center;
           gap: 6px; padding: 10px 18px; border: none; border-radius: 8px;
           font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-danger { background: #fef2f2; color: var(--danger); border: 1.5px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-full { width: 100%; margin-top: 8px; }
    .error-msg { font-size: 13px; color: var(--danger); margin-top: 8px;
                 padding: 8px 12px; background: #fef2f2; border-radius: 6px;
                 display: none; }
    .error-msg.show { display: block; }

    /* ── App layout ── */
    #app { display: none; height: 100vh; overflow: hidden; }
    #app.visible { display: flex; }

    #sidebar {
      width: 220px; flex-shrink: 0; background: var(--sidebar-bg);
      display: flex; flex-direction: column; padding: 20px 12px; overflow-y: auto;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 8px 20px; margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand .brand-icon {
      width: 34px; height: 34px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .sidebar-brand .brand-name { color: #f1f5f9; font-size: 15px; font-weight: 600; }
    .nav-list { list-style: none; flex: 1; margin-top: 8px; }
    .nav-list li + li { margin-top: 2px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 9px 12px;
      border-radius: 8px; color: #94a3b8; text-decoration: none;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s;
    }
    .nav-link:hover { background: var(--sidebar-hover); color: #e2e8f0; }
    .nav-link.active { background: var(--sidebar-active); color: #fff; }
    .nav-link .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-user {
      border-top: 1px solid rgba(255,255,255,.08); padding-top: 16px; margin-top: 8px;
    }
    .sidebar-user .user-name { color: #cbd5e1; font-size: 13px; font-weight: 500;
                               padding: 0 4px 8px; }
    .sidebar-user .user-email { color: #64748b; font-size: 12px; padding: 0 4px 12px; }
    #logout-btn {
      width: 100%; text-align: left; background: none; border: none;
      color: #64748b; font-size: 13px; padding: 8px 12px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .15s;
    }
    #logout-btn:hover { background: rgba(220,38,38,.15); color: #f87171; }

    /* ── Main content ── */
    #main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { margin-bottom: 24px; }
    .page-header h2 { font-size: 22px; font-weight: 700; }
    .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    /* ── Cards ── */
    .cards-grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    .card {
      background: var(--surface); border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase;
                  letter-spacing: .6px; color: var(--text-muted); margin-bottom: 6px; }
    .card-value { font-size: 28px; font-weight: 700; color: var(--text); }
    .card-value.sm { font-size: 18px; }
    .card-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .card-actions { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }

    .stat-cards { display: grid; gap: 16px;
                  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .stat-card .s-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .stat-card .s-value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    .stat-card .s-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Table ── */
    .table-wrap { background: var(--surface); border-radius: var(--radius);
                  box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border);
                    display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .table-title { font-size: 15px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--text-muted); background: #f8fafc; border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .empty-row td { text-align: center; color: var(--text-muted); padding: 32px; font-size: 14px; }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; padding: 3px 9px;
      border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .badge-active, .badge-booked   { background: #dcfce7; color: #15803d; }
    .badge-frozen                  { background: #dbeafe; color: #1d4ed8; }
    .badge-expired, .badge-cancelled { background: #f1f5f9; color: #64748b; }
    .badge-pending                 { background: #fef9c3; color: #a16207; }
    .badge-scheduled               { background: #ede9fe; color: #6d28d9; }
    .badge-completed               { background: #dcfce7; color: #15803d; }

    /* ── Filters ── */
    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
               padding: 14px 20px; border-bottom: 1px solid var(--border); background: #fafafa; }
    .filters input, .filters select {
      padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 7px;
      font-size: 13px; outline: none; background: var(--surface); transition: border-color .2s;
    }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--surface); border-radius: 14px; padding: 28px;
      width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .modal-info {
      background: #f8fafc; border-radius: 8px; padding: 14px 16px;
      margin-bottom: 18px; font-size: 14px;
    }
    .modal-info .mi-row { display: flex; justify-content: space-between; gap: 8px; }
    .modal-info .mi-row + .mi-row { margin-top: 6px; }
    .modal-info .mi-label { color: var(--text-muted); }
    .modal-info .mi-value { font-weight: 500; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-form-group { margin-bottom: 14px; }
    .modal-form-group label { display: block; font-size: 13px; font-weight: 500;
                              color: var(--text-muted); margin-bottom: 6px; }
    .modal-form-group select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .modal-form-group select:focus { border-color: var(--accent); }

    /* ── Misc ── */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .text-muted { color: var(--text-muted); }
    .plan-price { font-size: 24px; font-weight: 700; color: var(--accent); }
    .plan-detail { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .plan-badge { display: inline-block; background: #ede9fe; color: var(--accent);
                  font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .welcome-banner {
      background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
      border-radius: var(--radius); padding: 24px 28px; color: #fff; margin-bottom: 24px;
    }
    .welcome-banner h3 { font-size: 20px; font-weight: 700; }
    .welcome-banner p { font-size: 14px; opacity: .85; margin-top: 4px; }
    .spots-bar { font-size: 12px; color: var(--text-muted); }
    .spots-ok { color: var(--success); font-weight: 500; }
    .spots-low { color: var(--warning); font-weight: 500; }
    .spots-full { color: var(--danger); font-weight: 500; }
    a { text-decoration: none; }
    .no-data { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .no-data .nd-icon { font-size: 40px; margin-bottom: 12px; }
    .no-data p { font-size: 14px; }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏋</div>
      <h1>FitnessNetwork</h1>
      <p>Личный кабинет клиента</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="inp-email" placeholder="your@email.com" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="inp-password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <div id="login-error" class="error-msg"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">Войти</button>
    </form>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏋</div>
      <span class="brand-name">FitnessNetwork</span>
    </div>
    <ul class="nav-list">
      <li><a class="nav-link" data-page="dashboard"><span class="nav-icon">🏠</span> Главная</a></li>
      <li><a class="nav-link" data-page="schedule"><span class="nav-icon">📅</span> Расписание</a></li>
      <li><a class="nav-link" data-page="bookings"><span class="nav-icon">🎟</span> Мои записи</a></li>
      <li><a class="nav-link" data-page="plans"><span class="nav-icon">💳</span> Абонементы</a></li>
    </ul>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name">—</div>
      <div class="user-email" id="sb-email">—</div>
      <button id="logout-btn">↩ Выйти</button>
    </div>
  </nav>

  <!-- Main -->
  <main id="main">

    <!-- ─── Dashboard ─── -->
    <div id="page-dashboard" class="page">
      <div id="dash-content"><div class="loading">Загрузка…</div></div>
    </div>

    <!-- ─── Schedule ─── -->
    <div id="page-schedule" class="page">
      <div class="page-header">
        <h2>Расписание занятий</h2>
        <p>Выберите занятие и запишитесь</p>
      </div>
      <div class="table-wrap">
        <div class="filters">
          <input type="date" id="f-date-from" title="С даты" />
          <input type="date" id="f-date-to" title="По дату" />
          <button class="btn btn-ghost btn-sm" id="f-reset">Сбросить</button>
          <button class="btn btn-primary btn-sm" id="f-apply">Применить</button>
        </div>
        <div id="schedule-body"></div>
      </div>
    </div>

    <!-- ─── My Bookings ─── -->
    <div id="page-bookings" class="page">
      <div class="page-header">
        <h2>Мои записи</h2>
        <p>Список ваших записей на занятия</p>
      </div>
      <div class="table-wrap">
        <div id="bookings-body"></div>
      </div>
    </div>

    <!-- ─── Plans ─── -->
    <div id="page-plans" class="page">
      <div class="page-header">
        <h2>Доступные абонементы</h2>
        <p>Ознакомьтесь с тарифными планами</p>
      </div>
      <div id="plans-body"></div>
    </div>

  </main>
</div>

<!-- ══════════════ MODAL ══════════════ -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div id="modal-inner"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
const state = {
  token: localStorage.getItem('fn_token'),
  clientId: null,
  client: null,
  subscriptions: [],
  currentPage: 'dashboard',
};

// ══════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════
function parseJwt(token) {
  try {
    const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(b64));
  } catch { return {}; }
}

function fmt(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' })
    + ' ' + d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
}
function fmtDate(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'long', year:'numeric' });
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const STATUS_MAP = {
  active: '<span class="badge badge-active">Активен</span>',
  frozen: '<span class="badge badge-frozen">Заморожен</span>',
  expired: '<span class="badge badge-expired">Истёк</span>',
  cancelled: '<span class="badge badge-cancelled">Отменён</span>',
  pending: '<span class="badge badge-pending">Ожидает</span>',
  booked: '<span class="badge badge-booked">Записан</span>',
  scheduled: '<span class="badge badge-scheduled">Запланировано</span>',
  completed: '<span class="badge badge-completed">Завершено</span>',
};
function badge(status) { return STATUS_MAP[status] ?? `<span class="badge">${esc(status)}</span>`; }

// ══════════════════════════════════════════
//  API
// ══════════════════════════════════════════
async function apiFetch(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (state.token) opts.headers['Authorization'] = `Bearer ${state.token}`;
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (res.status === 204 || res.status === 201 && method === 'DELETE') return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  if (res.status === 201) return res.json();
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
const api = {
  get:  (url)       => apiFetch('GET',    url),
  post: (url, body) => apiFetch('POST',   url, body),
  del:  (url)       => apiFetch('DELETE', url),
};

// ══════════════════════════════════════════
//  Auth
// ══════════════════════════════════════════
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Вход…';
  try {
    const email    = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-password').value;
    const data = await api.post('/auth/client/login', { email, password });
    state.token = data.token;
    localStorage.setItem('fn_token', state.token);
    await initApp();
  } catch(err) {
    errEl.textContent = err.message === 'HTTP 401'
      ? 'Неверный email или пароль' : err.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  state.token = null;
  state.clientId = null;
  state.client = null;
  state.subscriptions = [];
  localStorage.removeItem('fn_token');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
});

// ══════════════════════════════════════════
//  Navigation
// ══════════════════════════════════════════
document.querySelectorAll('.nav-link[data-page]').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    navigate(link.dataset.page);
  });
});

function navigate(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-link').forEach(l =>
    l.classList.toggle('active', l.dataset.page === page));
  document.querySelectorAll('.page').forEach(p =>
    p.classList.toggle('active', p.id === `page-${page}`));
  if (page === 'dashboard') renderDashboard();
  if (page === 'schedule')  renderSchedule();
  if (page === 'bookings')  renderBookings();
  if (page === 'plans')     renderPlans();
}

// ══════════════════════════════════════════
//  Init
// ══════════════════════════════════════════
async function initApp() {
  const payload = parseJwt(state.token);
  state.clientId = payload.sub;
  try {
    state.client = await api.get('/clients/me');
    state.subscriptions = await api.get(`/clients/${state.clientId}/subscriptions`);
  } catch { /* ignore */ }

  document.getElementById('sb-name').textContent =
    state.client ? `${state.client.firstName} ${state.client.lastName}` : '—';
  document.getElementById('sb-email').textContent = state.client?.email ?? '';

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  navigate('dashboard');
}

// ══════════════════════════════════════════
//  Dashboard
// ══════════════════════════════════════════
async function renderDashboard() {
  const el = document.getElementById('dash-content');
  el.innerHTML = '<div class="loading">Загрузка…</div>';

  try {
    const subs = await api.get(`/clients/${state.clientId}/subscriptions`);
    state.subscriptions = subs;
    const active = subs.filter(s => s.status === 'active');

    el.innerHTML = `
      <div class="welcome-banner">
        <h3>Добро пожаловать, ${esc(state.client?.firstName ?? 'Клиент')}!</h3>
        <p>${active.length > 0
          ? `У вас ${active.length} активн${active.length === 1 ? 'ый' : 'ых'} абонемент${active.length === 1 ? '' : 'а(ов)'}`
          : 'Нет активных абонементов'}</p>
      </div>

      <div class="stat-cards">
        <div class="stat-card">
          <div class="s-label">Всего абонементов</div>
          <div class="s-value">${subs.length}</div>
        </div>
        <div class="stat-card">
          <div class="s-label">Активных</div>
          <div class="s-value" style="color:var(--success)">${active.length}</div>
        </div>
        <div class="stat-card">
          <div class="s-label">Замороженных</div>
          <div class="s-value" style="color:var(--info)">${subs.filter(s=>s.status==='frozen').length}</div>
        </div>
      </div>

      <div class="section-title">Мои абонементы</div>
      ${subs.length === 0
        ? `<div class="no-data"><div class="nd-icon">💳</div><p>Абонементов пока нет</p></div>`
        : `<div class="cards-grid">${subs.map(subCard).join('')}</div>`}
    `;
  } catch(err) {
    el.innerHTML = `<div class="no-data"><p>Ошибка загрузки: ${esc(err.message)}</p></div>`;
  }
}

function subCard(s) {
  const st = s.subscriptionType ?? {};
  const visitsLine = s.visitsLeft != null
    ? `<div class="plan-detail">Осталось посещений: <b>${s.visitsLeft}</b></div>`
    : `<div class="plan-detail">Посещения: <b>безлимит</b></div>`;
  const expLine = s.expiresAt
    ? `<div class="plan-detail">Действует до: <b>${fmtDate(s.expiresAt)}</b></div>`
    : '';
  return `
    <div class="card">
      <div class="card-label">${esc(st.name ?? '—')}</div>
      <div style="margin-bottom:8px">${badge(s.status)}</div>
      <div class="plan-detail">Начало: ${fmtDate(s.startedAt)}</div>
      ${expLine}
      ${visitsLine}
    </div>`;
}

// ══════════════════════════════════════════
//  Schedule
// ══════════════════════════════════════════
async function renderSchedule() {
  const el = document.getElementById('schedule-body');
  el.innerHTML = '<div class="loading">Загрузка…</div>';

  const fromVal = document.getElementById('f-date-from').value;
  const toVal   = document.getElementById('f-date-to').value;
  const params  = new URLSearchParams();
  const now = new Date();
  const defaultFrom = fromVal
    ? new Date(fromVal + 'T00:00:00').toISOString()
    : now.toISOString();
  params.set('from', defaultFrom);
  if (toVal) params.set('to', new Date(toVal + 'T23:59:59').toISOString());

  try {
    const items = await api.get(`/schedule?${params}`);
    if (items.length === 0) {
      el.innerHTML = `<div class="no-data"><div class="nd-icon">📅</div>
        <p>Нет запланированных занятий</p></div>`;
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Дата и время</th>
          <th>Занятие</th>
          <th>Тренер</th>
          <th>Клуб / Зал</th>
          <th>Места</th>
          <th>Статус</th>
          <th></th>
        </tr></thead>
        <tbody>${items.map(scheduleRow).join('')}</tbody>
      </table>`;

    el.querySelectorAll('[data-book]').forEach(btn => {
      btn.addEventListener('click', () => openBookModal(btn.dataset.book, items));
    });
  } catch(err) {
    el.innerHTML = `<div class="no-data"><p>Ошибка: ${esc(err.message)}</p></div>`;
  }
}

function scheduleRow(cs) {
  const booked = (cs.bookings ?? []).length;
  const free   = cs.capacity - booked;
  let spotsHtml;
  if (free <= 0)       spotsHtml = `<span class="spots-full">Мест нет</span>`;
  else if (free <= 3)  spotsHtml = `<span class="spots-low">${free} из ${cs.capacity}</span>`;
  else                 spotsHtml = `<span class="spots-ok">${free} из ${cs.capacity}</span>`;

  const trainer = cs.trainer ? `${esc(cs.trainer.firstName)} ${esc(cs.trainer.lastName)}` : '—';
  const club    = cs.hall?.club?.name ?? '—';
  const hall    = cs.hall?.name ?? '—';

  const canBook = cs.status === 'scheduled' && free > 0;
  const bookBtn = canBook
    ? `<button class="btn btn-primary btn-sm" data-book="${esc(cs.id)}">Записаться</button>`
    : '';

  return `<tr>
    <td style="white-space:nowrap">${fmt(cs.startsAt)}</td>
    <td><b>${esc(cs.classType?.name ?? '—')}</b></td>
    <td>${trainer}</td>
    <td>${esc(club)}<br><span class="text-muted" style="font-size:12px">${esc(hall)}</span></td>
    <td>${spotsHtml}</td>
    <td>${badge(cs.status)}</td>
    <td>${bookBtn}</td>
  </tr>`;
}

document.getElementById('f-apply').addEventListener('click', renderSchedule);
document.getElementById('f-reset').addEventListener('click', () => {
  document.getElementById('f-date-from').value = '';
  document.getElementById('f-date-to').value = '';
  renderSchedule();
});

// ══════════════════════════════════════════
//  Book modal
// ══════════════════════════════════════════
function openBookModal(scheduleId, items) {
  const cs = items.find(i => i.id === scheduleId);
  if (!cs) return;

  const activeSubs = state.subscriptions.filter(s => s.status === 'active');
  if (activeSubs.length === 0) {
    showModal(`
      <div class="modal-title">Нет активного абонемента</div>
      <div class="modal-sub">Для записи на занятие необходим активный абонемент.</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Закрыть</button>
      </div>`);
    return;
  }

  const subOptions = activeSubs.map(s =>
    `<option value="${esc(s.id)}">${esc(s.subscriptionType?.name ?? s.id)}
     ${s.visitsLeft != null ? `(осталось: ${s.visitsLeft})` : '(безлимит)'}</option>`).join('');

  showModal(`
    <div class="modal-title">Записаться на занятие</div>
    <div class="modal-sub">Подтвердите запись</div>
    <div class="modal-info">
      <div class="mi-row"><span class="mi-label">Занятие</span>
        <span class="mi-value">${esc(cs.classType?.name ?? '—')}</span></div>
      <div class="mi-row"><span class="mi-label">Дата</span>
        <span class="mi-value">${fmt(cs.startsAt)}</span></div>
      <div class="mi-row"><span class="mi-label">Тренер</span>
        <span class="mi-value">${cs.trainer ? esc(cs.trainer.firstName)+' '+esc(cs.trainer.lastName) : '—'}</span></div>
      <div class="mi-row"><span class="mi-label">Клуб</span>
        <span class="mi-value">${esc(cs.hall?.club?.name ?? '—')}</span></div>
    </div>
    ${activeSubs.length > 1 ? `
    <div class="modal-form-group">
      <label>Абонемент</label>
      <select id="modal-sub-select">${subOptions}</select>
    </div>` : `<input type="hidden" id="modal-sub-select" value="${activeSubs[0].id}" />`}
    <div id="modal-error" class="error-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="modal-confirm-btn">Записаться</button>
    </div>`);

  document.getElementById('modal-confirm-btn').addEventListener('click', async () => {
    const subId = document.getElementById('modal-sub-select').value;
    const errEl = document.getElementById('modal-error');
    const btn   = document.getElementById('modal-confirm-btn');
    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Запись…';
    try {
      await api.post('/bookings', { clientSubscriptionId: subId, classScheduleId: scheduleId });
      closeModal();
      // refresh subscriptions (visits_left changed)
      state.subscriptions = await api.get(`/clients/${state.clientId}/subscriptions`).catch(() => state.subscriptions);
      await renderSchedule();
    } catch(err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Записаться';
    }
  });
}

// ══════════════════════════════════════════
//  Bookings
// ══════════════════════════════════════════
async function renderBookings() {
  const el = document.getElementById('bookings-body');
  el.innerHTML = '<div class="loading">Загрузка…</div>';
  try {
    const items = await api.get('/bookings/my');
    if (items.length === 0) {
      el.innerHTML = `<div class="no-data"><div class="nd-icon">🎟</div>
        <p>Записей пока нет</p></div>`;
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Занятие</th>
          <th>Дата</th>
          <th>Тренер</th>
          <th>Клуб / Зал</th>
          <th>Статус</th>
          <th></th>
        </tr></thead>
        <tbody>${items.map(bookingRow).join('')}</tbody>
      </table>`;

    el.querySelectorAll('[data-cancel]').forEach(btn => {
      btn.addEventListener('click', () => cancelBooking(btn.dataset.cancel));
    });
  } catch(err) {
    el.innerHTML = `<div class="no-data"><p>Ошибка: ${esc(err.message)}</p></div>`;
  }
}

function bookingRow(b) {
  const cs      = b.classSchedule ?? {};
  const trainer = cs.trainer ? `${esc(cs.trainer.firstName)} ${esc(cs.trainer.lastName)}` : '—';
  const club    = cs.hall?.club?.name ?? '—';
  const hall    = cs.hall?.name ?? '—';
  const cancelBtn = b.status === 'booked'
    ? `<button class="btn btn-danger btn-sm" data-cancel="${esc(b.id)}">Отменить</button>`
    : '';
  return `<tr>
    <td><b>${esc(cs.classType?.name ?? '—')}</b></td>
    <td style="white-space:nowrap">${fmt(cs.startsAt)}</td>
    <td>${trainer}</td>
    <td>${esc(club)}<br><span class="text-muted" style="font-size:12px">${esc(hall)}</span></td>
    <td>${badge(b.status)}</td>
    <td>${cancelBtn}</td>
  </tr>`;
}

async function cancelBooking(bookingId) {
  if (!confirm('Отменить запись на занятие?')) return;
  try {
    await api.del(`/bookings/${bookingId}`);
    state.subscriptions = await api.get(`/clients/${state.clientId}/subscriptions`).catch(() => state.subscriptions);
    await renderBookings();
  } catch(err) {
    alert('Ошибка: ' + err.message);
  }
}

// ══════════════════════════════════════════
//  Plans
// ══════════════════════════════════════════
async function renderPlans() {
  const el = document.getElementById('plans-body');
  el.innerHTML = '<div class="loading">Загрузка…</div>';
  try {
    const plans = await api.get('/subscription-types');
    if (plans.length === 0) {
      el.innerHTML = `<div class="no-data"><div class="nd-icon">💳</div><p>Нет доступных абонементов</p></div>`;
      return;
    }
    el.innerHTML = `<div class="cards-grid">${plans.map(planCard).join('')}</div>`;
  } catch(err) {
    el.innerHTML = `<div class="no-data"><p>Ошибка: ${esc(err.message)}</p></div>`;
  }
}

function planCard(p) {
  const duration = p.durationDays != null
    ? `<div class="plan-detail">🗓 Срок: <b>${p.durationDays} дней</b></div>` : '';
  const visits = p.visitsLimit != null
    ? `<div class="plan-detail">🏃 Посещений: <b>${p.visitsLimit}</b></div>`
    : `<div class="plan-detail">🏃 Посещений: <b>безлимит</b></div>`;
  const clubs = p.isAllClubs
    ? `<div class="plan-detail">📍 <b>Все клубы сети</b></div>`
    : `<div class="plan-detail">📍 Отдельные клубы</div>`;
  return `
    <div class="card">
      <div class="card-label">Абонемент</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">${esc(p.name)}</div>
      <div class="plan-price">${Number(p.price).toLocaleString('ru-RU')} ₽</div>
      <div style="margin-top:12px">
        ${duration}
        ${visits}
        ${clubs}
      </div>
    </div>`;
}

// ══════════════════════════════════════════
//  Modal helpers
// ══════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ══════════════════════════════════════════
//  Bootstrap
// ══════════════════════════════════════════
(async function boot() {
  if (state.token) {
    try { await initApp(); }
    catch { localStorage.removeItem('fn_token'); }
  }
})();
</script>
</body>
</html>
